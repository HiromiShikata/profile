name: Resume Bilingual Sync Check

on:
  pull_request:
    branches: [main]
    paths:
      - "resume.ja.yaml"
      - "resume.en.yaml"

jobs:
  check-bilingual-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check both resume files are updated together
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          JA_CHANGED=$(git diff --name-only "$BASE_SHA" HEAD -- resume.ja.yaml | wc -l)
          EN_CHANGED=$(git diff --name-only "$BASE_SHA" HEAD -- resume.en.yaml | wc -l)
          if [ "$JA_CHANGED" -gt 0 ] || [ "$EN_CHANGED" -gt 0 ]; then
            if [ "$JA_CHANGED" -eq 0 ] || [ "$EN_CHANGED" -eq 0 ]; then
              echo "Error: When updating resume files, both resume.ja.yaml and resume.en.yaml must be updated together."
              echo "resume.ja.yaml changed: $JA_CHANGED"
              echo "resume.en.yaml changed: $EN_CHANGED"
              exit 1
            fi
            echo "OK: Both resume files were updated together."
          else
            echo "No resume files changed in this PR."
          fi
