name: format

on: push

jobs:
  format:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]' && !startsWith(github.head_ref, 'dependabot/') && !startsWith(github.head_ref, 'renovate/')
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN || github.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: git pull
      - run: |
          npm i
          npm run format
          git --no-pager diff
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: `npm run format`"
